version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: venta_app
    container_name: venta_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - venta-network

  web:
    image: nginx:stable
    container_name: venta_web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - venta-network

  db:
    image: mysql:8.0
    container_name: venta_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: venta
      MYSQL_USER: venta
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - venta-network

  node:
    image: node:18
    container_name: venta_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - venta-network

volumes:
  dbdata:

networks:
  venta-network:
